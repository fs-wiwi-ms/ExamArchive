services:
  db:
    image: postgres:18.3
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: exam_user
      POSTGRES_PASSWORD: exam_password
      POSTGRES_DB: exam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam_user -d exam_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart:
      unless-stopped
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_started
      oidc-mock:
        condition: service_started
    ports:
      - "1910:1910"
    environment:
      EXAMARCHIVE_DEV_MODE: "true"
      EXAMARCHIVE_DB_HOSTNAME: "db"
      EXAMARCHIVE_DB_PORT: "5432"
      EXAMARCHIVE_DB_USERNAME: "exam_user"
      EXAMARCHIVE_DB_PASSWORD: "exam_password"
      EXAMARCHIVE_DB_DATABASE: "exam_db"
      KEYCLOAK_ISSUER: "http://oidc-mock.localhost:8080/default"
      KEYCLOAK_CLIENT_ID: "exam-archive-local"
      KEYCLOAK_CLIENT_SECRET: "dummy-secret"
      KEYCLOAK_REDIRECT_URI: "http://localhost:1910/auth/callback"
      KEYCLOAK_USER_AFFILIATION: "student"
      KEYCLOAK_ADMIN_AFFILIATION: "admin"
      EXAMARCHIVE_STORAGE_ENDPOINT: "http://minio-local:9000"
      EXAMARCHIVE_STORAGE_ACCESS_KEY: "admin"
      EXAMARCHIVE_STORAGE_SECRET_KEY: "password123"
      EXAMARCHIVE_STORAGE_BUCKET: "exam-archive"
      EXAMARCHIVE_SMTP_HOST: ${EXAMARCHIVE_SMTP_HOST}
      EXAMARCHIVE_SMTP_PORT: ${EXAMARCHIVE_SMTP_PORT}
      EXAMARCHIVE_SMTP_USERNAME: ${EXAMARCHIVE_SMTP_USERNAME}
      EXAMARCHIVE_SMTP_PASSWORD: ${EXAMARCHIVE_SMTP_PASSWORD}
      EXAMARCHIVE_SMTP_FROM: ${EXAMARCHIVE_SMTP_FROM}
  storage:
    image: minio/minio:latest
    container_name: minio-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password123"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
  oidc-mock:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.0
    container_name: oidc-mock
    ports:
      - "8080:8080"
    networks:
      default:
        aliases:
          - oidc-mock.localhost
    environment:
      SERVER_PORT: 8080
      JSON_CONFIG: >
        {
          "interactiveLogin": true,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "default",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "redirect_uri",
                  "match": "http://localhost:1910/auth/callback",
                  "claims": {
                    "sub": "mock-dev-id",
                    "eppn": "dev_mock",
                    "given_name": "Dev",
                    "family_name": "User",
                    "email": "dev@localhost.local",
                    "affiliation": [
                      "admin"
                    ]
                  }
                }
              ]
            }
          ]
        }
volumes:
  postgres_data:
  minio-data: